<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Children Health Check & Booking</title>
    <link rel="stylesheet" href="combo.css">
</head>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f0f8ff;
}

/* Header */
header {
    background: blueviolet;
    color: white;
    text-align: center;
    padding: 15px;
}

/* Layout */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
    padding: 30px;
}

/* Services */
.services {
    width: 300px;
}

.services h2 {
    text-align: center;
    color: blueviolet;
    margin-bottom: 15px;
}

.card {
    background: white;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    box-shadow: 0 0 6px rgba(0,0,0,0.1);
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    background: blueviolet;
    color: white;
    transform: scale(1.05);
}

/* Booking Form */
.booking {
    background: white;
    padding: 20px;
    width: 330px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.booking h2 {
    text-align: center;
    color: blueviolet;
    margin-bottom: 10px;
}

form {
    display: flex;
    flex-direction: column;
}

label {
    margin-top: 10px;
    font-size: 14px;
}

input, textarea {
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

textarea {
    resize: none;
    height: 60px;
}

/* Checkbox */
.checkbox-group {
    margin-top: 10px;
}

.checkbox-group label {
    display: block;
    font-size: 13px;
    margin: 3px 0;
}

/* Button */
button {
    margin-top: 15px;
    padding: 10px;
    border: none;
    background: rgb(177, 121, 230);
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: blueviolet;
}

/* Footer */
footer {
    background: blueviolet;
    color: white;
    text-align: center;
    padding: 10px;
}
.card.active {
    background: blueviolet;
    color: white;
}
</style>
<body>

<header>
    <h1>🧒 Children Health Check Center</h1>
</header>

<section class="container">

    <!-- Health Check Services -->
    <div class="services">
        <h2>Health Check Services</h2>

        <div class="card">🩺 General Checkup</div>
        <div class="card">💉 Vaccination</div>
        <div class="card">📈 Growth Monitoring</div>
        <div class="card">👁 Eye Checkup</div>
        <div class="card">🦷 Dental Checkup</div>
        <div class="card">❤️ Heart Check (ECG)</div>
        <div class="card">🫁 Lung Function Test</div>
        <div class="card">🩸 Blood Test</div>
        <div class="card">🧬 Allergy Test</div>
        <div class="card">🧠 Neurological Check</div>

    </div>

    <!-- Booking Form -->
    <div class="booking">
        <h2>📅 Book Appointment</h2>

        <form>

            <label>Parent Name</label>
            <input type="text" required>

            <label>Child Name</label>
            <input type="text" required>

            <label>Age</label>
            <input type="number" required>

            <label>Phone Number</label>
            <input type="tel" required>

            <label>Select Health Checks</label>

            <div class="checkbox-group">
                <label><input type="checkbox"> General Checkup</label>
                <label><input type="checkbox"> Vaccination</label>
                <label><input type="checkbox"> Growth Monitoring</label>
                <label><input type="checkbox"> Eye Checkup</label>
                <label><input type="checkbox"> Dental Checkup</label>
                <label><input type="checkbox"> Heart Check</label>
                <label><input type="checkbox"> Blood Test</label>
                <label><input type="checkbox"> Allergy Test</label>
            </div>

            <label>Preferred Date</label>
            <input type="date" required>

            <label>Preferred Time</label>
            <input type="time" required>

            <label>Additional Notes</label>
            <textarea placeholder="Optional"></textarea>

            <button type="submit">Confirm Booking</button>

        </form>
    </div>

</section>

<footer>
    <p>© 2026 CareLix Pharmacy</p>
</footer>

</body>
</html>
