<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pharmacy Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<style>
  body{
  margin: 0;
  font-family: Supermercado One;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: paleturquoise;
}
.container {
  width: 100%;
  max-width: 400px;
}

.login-box {
  background: #fff;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.login-box h2 {
  text-align: center;
  margin-bottom: 20px;
}
.login-box h5 {
  text-align: center;
  margin-bottom: 20px;
}

.input-box {
  position: relative;
  margin-bottom: 25px;
  border-radius: 20px;
}

.input-box input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  outline: none;
}

.input-box label {
  position: absolute;
  top: 50%;
  left: 10px;
  color: #777;
  transform: translateY(-50%);
  transition: 0.3s;
  background: #fff;
  padding: 0 5px;
}

.input-box input:focus + label,
.input-box input:valid + label {
  top: -8px;
  font-size: 12px;
  color: #7acccc;
}

.options {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 10px;
  background: #000000;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: -1px -1px 2px 2px gray;
}
.Pharm-link{
  color: #0d969b;
}

button:hover {
  background: #0d969b;
}
.forgot-link{
    color: #090796;
    text-decoration: none;
}
.forgot-link:hover{
    text-decoration-: underline;
}
</style>
<body>

<div class="container">
  <div class="login-box">
    <h2>Pharmacy Login</h2>
    <h5>Visiting Now</h5>

    <form>
      <div class="input-box">
        <input type="email" required>
        <label>Email</label>
      </div>

      <div class="input-box">
        <input type="password" required>
        <label>Password</label>
      </div>

      <div class="options">
        <a href="forgot.html" class="forgot-link">Forgot Password?</a>
      </div>
      <div>
      <button type="submit"><a href="/Pharm.html" class="Pharm-link">Login</a></button>
      
      </div>
    </form>
  </div>
</div>
</body>
</html>
