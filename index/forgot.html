<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pharmacy Login</title>
  <link rel="stylesheet" href="sty.css">
</head>
<style>
  body{
  margin: 0;
  font-family: Supermercado One;
  background: paleturquoise;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 400px;
}

.login-box {
  background: #fff;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.login-box h2 {
  text-align: center;
  margin-bottom: 20px;
}
.login-box h4 {
  text-align: center;
  margin-bottom: 20px;
}

.input-box {
  position: relative;
  margin-bottom: 25px;
  border-radius: 20px;
}

.input-box input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  outline: none;
}

.input-box label {
  position: absolute;
  top: 50%;
  left: 10px;
  color: #777;
  transform: translateY(-50%);
  transition: 0.3s;
  background: #fff;
  padding: 0 5px;
}

.input-box input:focus + label,
.input-box input:valid + label {
  top: -8px;
  font-size: 12px;
  color: #108f8f;
}
button {
  width: 100%;
  padding: 10px;
  background: #000000;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 1px 1px 2px 2px #777;
}

button:hover {
  background: #0d969b;
}
.index-link{
    color: #090796;
    text-decoration: none;   
}
.index-link:hover{
    text-decoration-: underline;
}
</style>
<body>

<div class="container">
  <div class="login-box">
    <h2>Recollect Me</h2>
    <h4>Full in the blank</h4>

    <form>
      <div class="input-box">
        <input type="username" required>
        <label>Username</label>
      </div>

      <div class="input-box">
        <input type="password" required>
        <label>Password</label>
      </div>

       <div class="input-box">
        <input type="email" required>
        <label>Email</label>
      </div>
      <a href="index.html" class="index-link">Back to Login</a>
       <button type="submit">Login</button>
    </form>
  </div>
</div>

</body>
</html>
